<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TikTok Sans Font Preview</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; color: #fff; font-family: system-ui, sans-serif; padding: 20px; }

.controls {
  position: sticky; top: 0; z-index: 100; background: #111; padding: 16px 0 12px;
  border-bottom: 1px solid #333; margin-bottom: 20px;
  display: flex; gap: 24px; align-items: center; flex-wrap: wrap;
}
.controls label { font-size: 13px; color: #aaa; display: flex; align-items: center; gap: 8px; }
.controls input[type=range] { width: 200px; accent-color: #FE2C55; }
.controls input[type=text] { background: #222; border: 1px solid #444; color: #fff; padding: 4px 8px; border-radius: 4px; width: 300px; }
.controls .val { font-size: 14px; font-weight: bold; color: #fff; min-width: 36px; }
.controls button { background: #333; border: 1px solid #555; color: #fff; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
.controls button:hover { background: #444; }
.controls button.active { background: #FE2C55; border-color: #FE2C55; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}
.card {
  background: #1a1a1a; border: 2px solid #333; border-radius: 8px; overflow: hidden;
  transition: border-color 0.2s;
}
.card:hover { border-color: #555; }
.card.dimmed { opacity: 0.25; }
.card-header {
  padding: 8px 12px; background: #222; border-bottom: 1px solid #333;
  display: flex; justify-content: space-between; align-items: center;
}
.card-header .name { font-size: 12px; font-weight: bold; color: #FADE4B; }
.card-header .meta { font-size: 10px; color: #666; }
.preview-box {
  aspect-ratio: 9/16; display: flex; align-items: center; justify-content: center;
  padding: 16px; text-align: center; overflow: hidden;
}
.preview-box span { word-break: break-word; white-space: pre-wrap; }
</style>
</head>
<body>

<h2 style="margin-bottom: 8px;">TikTok Sans Font Comparison</h2>
<p style="color: #666; font-size: 13px; margin-bottom: 12px;">All fonts rendered live. Adjust size, text, and filter to compare.</p>

<div class="controls">
  <label>Size <input type="range" id="sizeSlider" min="12" max="120" value="40"> <span class="val" id="sizeVal">40px</span></label>
  <label>Preview Text <input type="text" id="textInput" value="The quick brown fox jumps over the lazy dog"></label>
  <label>Filter
    <button class="active" data-filter="all">All</button>
    <button data-filter="12pt">12pt</button>
    <button data-filter="16pt">16pt</button>
    <button data-filter="36pt">36pt</button>
    <button data-filter="base">Base</button>
    <button data-filter="italic">Italic</button>
    <button data-filter="no-italic">No Italic</button>
  </label>
</div>

<div class="grid" id="grid"></div>

<script>
const FONTS = [
  "TikTokSans-Bold.ttf","TikTokSans-Regular.ttf",
  "TikTokSans12pt-Black.ttf","TikTokSans12pt-BlackItalic.ttf",
  "TikTokSans12pt-Bold.ttf","TikTokSans12pt-BoldItalic.ttf",
  "TikTokSans12pt-ExtraBold.ttf","TikTokSans12pt-ExtraBoldItalic.ttf",
  "TikTokSans12pt-Light.ttf","TikTokSans12pt-LightItalic.ttf",
  "TikTokSans12pt-Medium.ttf","TikTokSans12pt-MediumItalic.ttf",
  "TikTokSans12pt-Regular.ttf","TikTokSans12pt-RegularItalic.ttf",
  "TikTokSans12pt-SemiBold.ttf","TikTokSans12pt-SemiBoldItalic.ttf",
  "TikTokSans16pt-Black.ttf","TikTokSans16pt-BlackItalic.ttf",
  "TikTokSans16pt-Bold.ttf","TikTokSans16pt-BoldItalic.ttf",
  "TikTokSans16pt-ExtraBold.ttf","TikTokSans16pt-ExtraBoldItalic.ttf",
  "TikTokSans16pt-Light.ttf","TikTokSans16pt-LightItalic.ttf",
  "TikTokSans16pt-Medium.ttf","TikTokSans16pt-MediumItalic.ttf",
  "TikTokSans16pt-Regular.ttf","TikTokSans16pt-RegularItalic.ttf",
  "TikTokSans16pt-SemiBold.ttf","TikTokSans16pt-SemiBoldItalic.ttf",
  "TikTokSans36pt-Black.ttf","TikTokSans36pt-BlackItalic.ttf",
  "TikTokSans36pt-Bold.ttf","TikTokSans36pt-BoldItalic.ttf",
  "TikTokSans36pt-ExtraBold.ttf","TikTokSans36pt-ExtraBoldItalic.ttf",
  "TikTokSans36pt-Italic.ttf",
  "TikTokSans36pt-Light.ttf","TikTokSans36pt-LightItalic.ttf",
  "TikTokSans36pt-Medium.ttf","TikTokSans36pt-MediumItalic.ttf",
  "TikTokSans36pt-Regular.ttf",
  "TikTokSans36pt-SemiBold.ttf","TikTokSans36pt-SemiBoldItalic.ttf",
];

// Register fonts and build cards
const grid = document.getElementById('grid');
const style = document.createElement('style');
const faces = [];
const cards = [];

for (const file of FONTS) {
  const name = file.replace('.ttf', '');
  const family = `preview-${name}`;
  faces.push(`@font-face { font-family: '${family}'; src: url('/fonts/${file}') format('truetype'); }`);

  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.font = file;
  card.dataset.name = name;

  const isItalic = name.includes('Italic');
  const ptMatch = name.match(/(12pt|16pt|36pt)/);
  const ptSize = ptMatch ? ptMatch[1] : 'base';
  card.dataset.pt = ptSize;
  card.dataset.italic = isItalic ? 'yes' : 'no';

  // Extract weight
  let weight = name.replace(/TikTokSans(12pt|16pt|36pt)?-?/, '');
  if (!weight) weight = 'Regular';
  card.dataset.weight = weight;

  card.innerHTML = `
    <div class="card-header">
      <span class="name">${name}</span>
      <span class="meta">${ptSize} · ${weight}</span>
    </div>
    <div class="preview-box">
      <span style="font-family: '${family}', sans-serif;" data-preview>The quick brown fox jumps over the lazy dog</span>
    </div>
  `;
  grid.appendChild(card);
  cards.push(card);
}

style.textContent = faces.join('\n');
document.head.appendChild(style);

// Controls
const sizeSlider = document.getElementById('sizeSlider');
const sizeVal = document.getElementById('sizeVal');
const textInput = document.getElementById('textInput');

function updateSize(v) {
  sizeVal.textContent = v + 'px';
  document.querySelectorAll('[data-preview]').forEach(el => el.style.fontSize = v + 'px');
}

function updateText(t) {
  document.querySelectorAll('[data-preview]').forEach(el => el.textContent = t);
}

sizeSlider.addEventListener('input', e => updateSize(e.target.value));
textInput.addEventListener('input', e => updateText(e.target.value));

// Filters
let activeFilter = 'all';
document.querySelectorAll('[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    applyFilter();
  });
});

function applyFilter() {
  for (const card of cards) {
    let show = true;
    if (activeFilter === '12pt') show = card.dataset.pt === '12pt';
    else if (activeFilter === '16pt') show = card.dataset.pt === '16pt';
    else if (activeFilter === '36pt') show = card.dataset.pt === '36pt';
    else if (activeFilter === 'base') show = card.dataset.pt === 'base';
    else if (activeFilter === 'italic') show = card.dataset.italic === 'yes';
    else if (activeFilter === 'no-italic') show = card.dataset.italic === 'no';
    card.classList.toggle('dimmed', !show);
    card.style.display = show ? '' : 'none';
  }
}

updateSize(40);
</script>
</body>
</html>
