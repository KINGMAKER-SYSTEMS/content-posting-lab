<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Posting Lab · Rising Tides</title>
    <script>
      // Apply theme before paint to avoid flash-of-light-theme.
      // Mirrors ThemeProvider: default dark, localStorage['rt-theme'] overrides.
      (function () {
        try {
          var stored = window.localStorage.getItem('rt-theme');
          var theme = stored === 'light' || stored === 'dark' ? stored : 'dark';
          if (theme === 'dark') document.documentElement.classList.add('dark');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.classList.add('dark');
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
